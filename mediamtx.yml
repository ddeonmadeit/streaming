# MediaMTX config — SRT ingest from Moblin, local RTMP read for the restreamer.
logLevel: info

# APIs / servers
api: yes
apiAddress: 127.0.0.1:9997        # internal only — do NOT open this port publicly

rtmp: yes
rtmpAddress: 127.0.0.1:1935       # internal only — the restreamer reads from here

srt: yes
srtAddress: :8890                 # PUBLIC — this is the only port you expose (UDP)

# Auth: publishing needs the password; local reads (restreamer) are allowed.
authMethod: internal
authInternalUsers:
  # Read is open so your Mac can pull the SAME feed (e.g. HLS on :8888) to relay
  # into TikTok LIVE Studio, WHILE Twitch/Kick keep running. It only exposes the
  # video you're already broadcasting publicly, so this is fine. Publishing still
  # requires the password below.
  - user: any
    permissions:
      - action: read
  # Publishing (your phone) requires the password from .env.
  - user: publisher
    pass: ${PUBLISH_PASS}
    ips: []
    permissions:
      - action: publish

paths:
  # Your phone publishes here. Moblin streamid: publish:live:publisher:<PUBLISH_PASS>
  live:
    # (optional) require SRT encryption too — uncomment and set in Moblin's passphrase field:
    # srtPublishPassphrase: "your-16plus-char-passphrase"
