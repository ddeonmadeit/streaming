# MediaMTX config — SRT ingest from Moblin, local RTMP read for the restreamer.
logLevel: info

# APIs / servers
api: yes
apiAddress: 127.0.0.1:9997        # internal only — do NOT open this port publicly

rtmp: yes
rtmpAddress: 127.0.0.1:1935       # internal only — the restreamer reads from here

srt: yes
srtAddress: :8890                 # PUBLIC — this is the only port you expose (UDP)

# Auto-record every stream to disk — the ORIGINAL phone feed, at the quality it
# was sent, before any platform re-encoding. Files land in ./recordings on the
# server (one folder per path, timestamped). Split into 1-hour segments.
recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
recordFormat: fmp4
recordSegmentDuration: 1h
recordDeleteAfter: 0s             # 0s = keep forever (delete old files yourself)

# Auth: publishing needs the password; local reads (restreamer) are allowed.
authMethod: internal
authInternalUsers:
  # Read is open (your Mac pulls the feed via HLS). 'api' lets the failover
  # feeder query path status on the localhost-only API (127.0.0.1:9997) so it
  # knows when your phone is live and switches BRB -> camera. Without it the
  # feeder never detects the live feed and stays stuck on the BRB screen.
  - user: any
    permissions:
      - action: read
      - action: api
  # Publishing requires the password. Put it in Moblin's dedicated STREAM ID field
  # as:  publish:live:publisher:<PUBLISH_PASS>   (secret stays in .env, not git).
  - user: publisher
    pass: ${PUBLISH_PASS}
    permissions:
      - action: publish

paths:
  # Your phone publishes here. Moblin streamid: publish:live:publisher:<PUBLISH_PASS>
  live:
    record: yes                    # save the original feed to ./recordings
